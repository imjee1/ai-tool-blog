name: Daily AI tool post

on:
  schedule:
    # 매일 UTC 23:00 = 한국시간(KST) 오전 8시
    - cron: "0 23 * * *"
  workflow_dispatch: {}  # 수동으로도 "Run workflow" 버튼으로 실행 가능

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 오늘의 글 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_post.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "ai-tool-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/content/blog
          git diff --cached --quiet && echo "새 글 없음, 커밋 생략" || git commit -m "chore: 오늘의 AI 툴 자동 발행"
          git push

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci

      - name: Astro 빌드
        run: npm run build

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 빌드 결과물 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: generate-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages에 배포
        id: deployment
        uses: actions/deploy-pages@v4
